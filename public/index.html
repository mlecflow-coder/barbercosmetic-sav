<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BarberCosmetic — Agent SAV</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f5f5f0; min-height: 100vh; color: #1a1a1a; }
    header { background: #1a1a1a; padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
    .logo span { color: #ff6b35; }
    .badge { background: rgba(255,107,53,0.15); border: 1px solid rgba(255,107,53,0.3); color: #ff6b35; font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 20px; letter-spacing: 0.5px; }
    .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
    .card { background: #fff; border-radius: 16px; padding: 32px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .card-title { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 20px; }
    .step-badge { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; background: #ff6b35; color: #fff; border-radius: 50%; font-size: 12px; font-weight: 700; margin-right: 8px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    label { font-size: 13px; font-weight: 500; color: #444; }
    input, textarea, select { border: 1.5px solid #e5e5e5; border-radius: 10px; padding: 12px 16px; font-size: 14px; font-family: 'Inter', sans-serif; color: #1a1a1a; background: #fafafa; transition: border-color 0.2s; outline: none; width: 100%; }
    input:focus, textarea:focus, select:focus { border-color: #ff6b35; background: #fff; }
    textarea { resize: vertical; min-height: 120px; line-height: 1.6; }
    .tracking-btn { width: 100%; padding: 13px; background: #1a73e8; color: #fff; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; margin-top: 8px; }
    .tracking-btn:hover { background: #1557b0; }
    .tracking-btn.disabled { background: #ccc; cursor: not-allowed; pointer-events: none; }
    .status-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 8px; }
    .status-option { border: 2px solid #e5e5e5; border-radius: 10px; padding: 10px 8px; text-align: center; cursor: pointer; transition: all 0.2s; font-size: 12px; font-weight: 500; color: #666; background: #fafafa; }
    .status-option:hover { border-color: #ff6b35; color: #ff6b35; }
    .status-option.selected { border-color: #ff6b35; background: rgba(255,107,53,0.08); color: #ff6b35; font-weight: 600; }
    .status-icon { font-size: 20px; display: block; margin-bottom: 4px; }
    .btn { width: 100%; padding: 15px; background: #1a1a1a; color: #fff; border: none; border-radius: 12px; font-size: 15px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 8px; }
    .btn:hover { background: #333; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .result-card { background: #fff; border-radius: 16px; padding: 32px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); display: none; }
    .result-card.visible { display: block; }
    .reply-box { background: #f8f8f5; border: 1.5px solid #e5e5e5; border-radius: 12px; padding: 20px; font-size: 14px; line-height: 1.8; color: #1a1a1a; white-space: pre-wrap; margin-bottom: 16px; }
    .copy-btn { width: 100%; padding: 13px; background: #ff6b35; color: #fff; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
    .copy-btn:hover { background: #e85d20; }
    .copy-btn.copied { background: #2e7d32; }
    .new-btn { width: 100%; padding: 13px; background: transparent; color: #888; border: 1.5px solid #e5e5e5; border-radius: 12px; font-size: 14px; font-weight: 500; font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.2s; }
    .new-btn:hover { border-color: #1a1a1a; color: #1a1a1a; }
    .divider { border: none; border-top: 1px solid #f0f0f0; margin: 20px 0; }
    .spinner { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } .status-grid { grid-template-columns: repeat(3, 1fr); } .container { margin: 20px auto; } .card { padding: 20px; } }
  </style>
</head>
<body>

<header>
  <div class="logo">Barber<span>Cosmetic</span></div>
  <div class="badge">AGENT SAV</div>
</header>

<div class="container">
  <div class="card" id="formCard">
    <div class="card-title">Nouveau message client</div>

    <!-- ÉTAPE 1 : Infos expédition -->
    <div style="margin-bottom: 20px;">
      <div style="font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #1a1a1a;">
        <span class="step-badge">1</span> Informations d'expédition
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Transporteur</label>
          <select id="carrier" onchange="updateTrackingBtn()">
            <option value="">-- Sélectionner --</option>
            <option value="mondialrelay">Mondial Relay</option>
            <option value="colissimo">Colissimo</option>
            <option value="ups">UPS</option>
            <option value="chronopost">Chronopost</option>
            <option value="colisprive">Colis Privé</option>
          </select>
        </div>
        <div class="form-group">
          <label>Numéro de commande Amazon</label>
          <input type="text" id="orderId" placeholder="ex: 408-9480146-2649948" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Numéro de suivi</label>
          <input type="text" id="trackingNumber" placeholder="ex: 84801065" oninput="updateTrackingBtn()" />
        </div>
        <div class="form-group">
          <label>Code postal du destinataire</label>
          <input type="text" id="postalCode" placeholder="ex: 28130" oninput="updateTrackingBtn()" />
        </div>
      </div>

      <a id="trackingLinkBtn" class="tracking-btn disabled" href="#" target="_blank" onclick="return checkTrackingBtn()">
        🔍 Voir le suivi en temps réel
      </a>
    </div>

    <hr class="divider" />

    <!-- ÉTAPE 2 : Statut constaté -->
    <div style="margin-bottom: 20px;">
      <div style="font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #1a1a1a;">
        <span class="step-badge">2</span> Statut constaté sur le site transporteur
      </div>
      <div class="status-grid">
        <div class="status-option" onclick="selectStatus('transit')">
          <span class="status-icon">🚚</span>En transit
        </div>
        <div class="status-option" onclick="selectStatus('pending')">
          <span class="status-icon">⏳</span>En attente
        </div>
        <div class="status-option" onclick="selectStatus('delivered')">
          <span class="status-icon">✅</span>Livré
        </div>
        <div class="status-option" onclick="selectStatus('undelivered')">
          <span class="status-icon">🔔</span>Avis passage
        </div>
        <div class="status-option" onclick="selectStatus('exception')">
          <span class="status-icon">⚠️</span>Anomalie
        </div>
      </div>
    </div>

    <hr class="divider" />

    <!-- ÉTAPE 3 : Message client -->
    <div style="margin-bottom: 20px;">
      <div style="font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #1a1a1a;">
        <span class="step-badge">3</span> Message du client
      </div>
      <textarea id="message" placeholder="Collez ici le message reçu sur Amazon Seller Central..."></textarea>
    </div>

    <button class="btn" id="submitBtn" onclick="generateReply()">
      ✨ Générer la réponse
    </button>
  </div>

  <!-- RÉSULTAT -->
  <div class="result-card" id="resultCard">
    <div style="font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 20px;">
      Réponse générée
    </div>
    <div class="reply-box" id="replyBox"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyReply()">
      📋 Copier la réponse
    </button>
    <button class="new-btn" onclick="resetForm()">
      ↩ Nouveau message
    </button>
  </div>
</div>

<script>
  const API_URL = window.location.origin;
  let selectedStatus = '';

  const TRACKING_URLS = {
    mondialrelay: (num, cp) => `https://www.mondialrelay.fr/suivi-de-colis/?numeroExpedition=${num}&codePostal=${cp}`,
    colissimo: (num) => `https://www.laposte.fr/outils/suivre-un-colis?code=${num}`,
    ups: (num) => `https://www.ups.com/track?tracknum=${num}&loc=fr_FR`,
    chronopost: (num) => `https://www.chronopost.fr/tracking-no-cms/suivi-de-colis?listeNumerosLT=${num}`,
    colisprive: (num) => `https://www.colisprive.fr/moncolis/pages/suivi.aspx?numColis=${num}`,
  };

  const STATUS_LABELS = {
    transit: "En transit — colis en route",
    pending: "En attente de prise en charge",
    delivered: "Livré — client conteste la réception",
    undelivered: "Tentative de livraison échouée / avis de passage",
    exception: "Anomalie / incident détecté",
  };

  function updateTrackingBtn() {
    const carrier = document.getElementById('carrier').value;
    const trackingNumber = document.getElementById('trackingNumber').value.trim();
    const postalCode = document.getElementById('postalCode').value.trim();
    const btn = document.getElementById('trackingLinkBtn');

    if (carrier && trackingNumber) {
      const url = TRACKING_URLS[carrier](trackingNumber, postalCode);
      btn.href = url;
      btn.classList.remove('disabled');
    } else {
      btn.href = '#';
      btn.classList.add('disabled');
    }
  }

  function checkTrackingBtn() {
    const btn = document.getElementById('trackingLinkBtn');
    if (btn.classList.contains('disabled')) return false;
    return true;
  }

  function selectStatus(status) {
    selectedStatus = status;
    document.querySelectorAll('.status-option').forEach(el => el.classList.remove('selected'));
    event.currentTarget.classList.add('selected');
  }

  async function generateReply() {
    const message = document.getElementById('message').value.trim();
    const orderId = document.getElementById('orderId').value.trim();
    const trackingNumber = document.getElementById('trackingNumber').value.trim();
    const carrier = document.getElementById('carrier').value;

    if (!message) {
      alert('Veuillez coller le message du client.');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div> Génération en cours...';

    // Enrichir le message avec le statut constaté
    let enrichedMessage = message;
    if (selectedStatus && STATUS_LABELS[selectedStatus]) {
      enrichedMessage = `[STATUT CONSTATÉ SUR LE SITE TRANSPORTEUR : ${STATUS_LABELS[selectedStatus]}]\n\n${message}`;
    }
    if (trackingNumber) {
      enrichedMessage = `[NUMÉRO DE SUIVI : ${trackingNumber}]\n` + enrichedMessage;
    }

    try {
      const response = await fetch(`${API_URL}/reply`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          message: enrichedMessage, 
          orderId: orderId || null,
        }),
      });

      const data = await response.json();
      document.getElementById('replyBox').textContent = data.reply;
      document.getElementById('formCard').style.display = 'none';
      document.getElementById('resultCard').classList.add('visible');

    } catch (error) {
      alert('Erreur de connexion. Vérifiez que le serveur est en ligne.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '✨ Générer la réponse';
    }
  }

  function copyReply() {
    const text = document.getElementById('replyBox').textContent;
    navigator.clipboard.writeText(text);
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ Copié !';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = '📋 Copier la réponse';
      btn.classList.remove('copied');
    }, 2000);
  }

  function resetForm() {
    document.getElementById('message').value = '';
    document.getElementById('orderId').value = '';
    document.getElementById('trackingNumber').value = '';
    document.getElementById('postalCode').value = '';
    document.getElementById('carrier').value = '';
    selectedStatus = '';
    document.querySelectorAll('.status-option').forEach(el => el.classList.remove('selected'));
    document.getElementById('trackingLinkBtn').href = '#';
    document.getElementById('trackingLinkBtn').classList.add('disabled');
    document.getElementById('resultCard').classList.remove('visible');
    document.getElementById('formCard').style.display = 'block';
  }
</script>

</body>
</html>
