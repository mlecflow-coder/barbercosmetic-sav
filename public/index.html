<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BarberCosmetic — Agent SAV</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f5f0;
      min-height: 100vh;
      color: #1a1a1a;
    }

    header {
      background: #1a1a1a;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .logo span { color: #ff6b35; }

    .badge {
      background: rgba(255,107,53,0.15);
      border: 1px solid rgba(255,107,53,0.3);
      color: #ff6b35;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 20px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 13px;
      font-weight: 500;
      color: #444;
    }

    input, textarea, select {
      border: 1.5px solid #e5e5e5;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: #1a1a1a;
      background: #fafafa;
      transition: border-color 0.2s;
      outline: none;
      width: 100%;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #ff6b35;
      background: #fff;
    }

    textarea {
      resize: vertical;
      min-height: 140px;
      line-height: 1.6;
    }

    .btn {
      width: 100%;
      padding: 15px;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
    }

    .btn:hover { background: #333; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .btn.loading { background: #555; }

    .result-card {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      display: none;
    }

    .result-card.visible { display: block; }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .result-title {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .tracking-badge {
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .tracking-found {
      background: #e8f5e9;
      color: #2e7d32;
    }

    .tracking-not-found {
      background: #fff3e0;
      color: #e65100;
    }

    .reply-box {
      background: #f8f8f5;
      border: 1.5px solid #e5e5e5;
      border-radius: 12px;
      padding: 20px;
      font-size: 14px;
      line-height: 1.8;
      color: #1a1a1a;
      white-space: pre-wrap;
      margin-bottom: 20px;
    }

    .copy-btn {
      width: 100%;
      padding: 13px;
      background: #ff6b35;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .copy-btn:hover { background: #e85d20; }
    .copy-btn.copied { background: #2e7d32; }

    .new-btn {
      width: 100%;
      padding: 13px;
      background: transparent;
      color: #888;
      border: 1.5px solid #e5e5e5;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 10px;
    }

    .new-btn:hover { border-color: #1a1a1a; color: #1a1a1a; }

    .tips {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .tip {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      font-size: 12.5px;
      color: #666;
      line-height: 1.5;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }

    .tip-icon { font-size: 20px; margin-bottom: 8px; }
    .tip-title { font-weight: 600; color: #1a1a1a; margin-bottom: 4px; font-size: 13px; }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      .tips { grid-template-columns: 1fr; }
      .container { margin: 20px auto; }
      .card { padding: 20px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Barber<span>Cosmetic</span></div>
  <div class="badge">AGENT SAV</div>
</header>

<div class="container">

  <div class="tips">
    <div class="tip">
      <div class="tip-icon">📦</div>
      <div class="tip-title">Suivi automatique</div>
      L'agent consulte PacklinkPro pour obtenir le statut en temps réel
    </div>
    <div class="tip">
      <div class="tip-icon">⚡</div>
      <div class="tip-title">Réponse en 2 secondes</div>
      Copie-colle directement dans Amazon Seller Central
    </div>
    <div class="tip">
      <div class="tip-icon">🔒</div>
      <div class="tip-title">Process litige</div>
      Lettre sur l'honneur + CNI → mlecflow@gmail.com
    </div>
  </div>

  <div class="card" id="formCard">
    <div class="card-title">Nouveau message client</div>

    <div class="form-row">
      <div class="form-group">
        <label>Numéro de commande Amazon</label>
        <input type="text" id="orderId" placeholder="ex: 408-9480146-2649948" />
      </div>
      <div class="form-group">
        <label>Nom du client (optionnel)</label>
        <input type="text" id="customerName" placeholder="ex: Jean Dupont" />
      </div>
    </div>

    <div class="form-group full" style="margin-bottom: 20px;">
      <label>Message du client</label>
      <textarea id="message" placeholder="Collez ici le message reçu sur Amazon Seller Central..."></textarea>
    </div>

    <button class="btn" id="submitBtn" onclick="generateReply()">
      ✨ Générer la réponse
    </button>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-title">Réponse générée</div>
      <div class="tracking-badge" id="trackingBadge"></div>
    </div>
    <div class="reply-box" id="replyBox"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyReply()">
      📋 Copier la réponse
    </button>
    <button class="new-btn" onclick="resetForm()">
      ↩ Nouveau message
    </button>
  </div>

</div>

<script>
  const API_URL = window.location.origin;

  async function generateReply() {
    const message = document.getElementById('message').value.trim();
    const orderId = document.getElementById('orderId').value.trim();
    const customerName = document.getElementById('customerName').value.trim();

    if (!message) {
      alert('Veuillez coller le message du client.');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.classList.add('loading');
    btn.innerHTML = '<div class="spinner"></div> Consultation PacklinkPro + génération...';

    try {
      const response = await fetch(`${API_URL}/reply`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, orderId, customerName }),
      });

      const data = await response.json();

      document.getElementById('replyBox').textContent = data.reply;

      const badge = document.getElementById('trackingBadge');
      if (data.trackingFound) {
        badge.textContent = '📦 Suivi PacklinkPro trouvé';
        badge.className = 'tracking-badge tracking-found';
      } else {
        badge.textContent = '⚠️ Suivi non trouvé';
        badge.className = 'tracking-badge tracking-not-found';
      }

      document.getElementById('formCard').style.display = 'none';
      document.getElementById('resultCard').classList.add('visible');

    } catch (error) {
      alert('Erreur de connexion. Vérifiez que le serveur est en ligne.');
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
      btn.innerHTML = '✨ Générer la réponse';
    }
  }

  function copyReply() {
    const text = document.getElementById('replyBox').textContent;
    navigator.clipboard.writeText(text);
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✅ Copié !';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = '📋 Copier la réponse';
      btn.classList.remove('copied');
    }, 2000);
  }

  function resetForm() {
    document.getElementById('message').value = '';
    document.getElementById('orderId').value = '';
    document.getElementById('customerName').value = '';
    document.getElementById('resultCard').classList.remove('visible');
    document.getElementById('formCard').style.display = 'block';
  }
</script>

</body>
</html>
